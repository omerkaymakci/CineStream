syntax = "proto3";

package com.cinestream.common.proto;

option java_package = "com.cinestream.common.proto";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

enum MovieEventType {
  UNKNOWN = 0;
  CREATED = 1;
  UPDATED = 2;
  DELETED = 3;
}

message MovieEvent {
  MovieEventType eventType = 1;

  int64 movieId = 2;
  string title = 3;
  string status = 4;
  string videoUrl = 5;

  google.protobuf.Timestamp occurredAt = 6;
}