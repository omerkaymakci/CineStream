server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:9000
              predicates:
                - Path=/auth/**
              filters:
                - RewritePath=/auth/(?<segment>.*), /$\{segment}
            - id: movie-service
              uri: http://localhost:8081
              predicates:
                - Path=/movies/**
              filters:
                - RemoveRequestHeader=Cookie
                - AddRequestHeader=Authorization, Bearer <token>