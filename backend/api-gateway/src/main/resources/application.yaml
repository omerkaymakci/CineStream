server:
  port: 8080

spring:
  application:
    name: api-gateway

  spring:
    security:
      oauth2:
        resourceserver:
          jwt:
            jwk-set-uri: http://localhost:9000/realms/cinestream/protocol/openid-connect/certs

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: movie-service
              uri: http://localhost:8081
              predicates:
                - Path=/movies/**
              filters:
                - RemoveRequestHeader=Cookie